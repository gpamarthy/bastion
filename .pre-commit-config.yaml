repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/ruff check
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format --check
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy src
        language: system
        pass_filenames: false
        types: [python]
